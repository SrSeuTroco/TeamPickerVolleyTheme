<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador de Vôlei Pró</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏐 Sorteador de Times Automático</h1>

<div class="container">

  <div class="card">
    <h2>Adicionar Jogador</h2>
    <input id="playerInput" type="text" placeholder="Nome do jogador">
    <br>
    <button id="addPlayerBtn">Adicionar</button>
    <div class="counter">Total de jogadores: <span id="playerCount">0</span></div>
    <div id="playersList" class="players"></div>
  </div>

  <div class="card">
    <h2>Configuração de Partida</h2>
    <label>Quantidade de Times:</label>
    <input type="number" id="teamCount" value="2" min="2">
    <br><br>
    <button id="drawTeamsBtn">🎲 Sortear e Definir Posse</button>
    <div id="teamsArea" class="teams"></div>
    <div id="matchArea"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
